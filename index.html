<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kungfu Agent - Live</title>
    <meta name="description" content="AI coding assistant with Kungfu-style episode tracking">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%2399873C'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-family='Arial' font-size='22' font-weight='700' fill='white'%3EKF%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #0B0C0E; --bg-secondary: #14171F; --bg-tertiary: #1C1F26; --accent: #99873C; --text-primary: #FFFFFF; --text-secondary: #A1A1AA; --text-muted: #71717A; --border: #27272A; --success: #22C55E; --error: #EF4444; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .logo h1 { font-size: 24px; }
        .status-badge { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg-secondary); border-radius: 20px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
        .status-dot.connected { background: var(--success); }
        .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        .panel { background: var(--bg-secondary); border-radius: 12px; border: 1px solid var(--border); }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { font-size: 16px; font-weight: 600; }
        .panel-content { padding: 20px; }
        .chat-container { height: 500px; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .message.user { align-self: flex-end; background: var(--accent); color: var(--bg-primary); }
        .message.agent { align-self: flex-start; background: var(--bg-tertiary); }
        .message.system { align-self: center; background: transparent; color: var(--text-muted); font-size: 12px; font-style: italic; }
        .message.error { background: rgba(239,68,68,0.2); border: 1px solid var(--error); }
        .input-area { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        .task-input { flex: 1; padding: 12px 16px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; resize: none; min-height: 48px; }
        .task-input:focus { outline: none; border-color: var(--accent); }
        .send-btn { padding: 12px 24px; background: var(--accent); color: var(--bg-primary); border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .send-btn:disabled { opacity: 0.5; }
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 13px; }
        .form-input { width: 100%; padding: 10px 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-size: 13px; font-family: monospace; }
        .form-input:focus { outline: none; border-color: var(--accent); }
        .save-btn { width: 100%; padding: 10px; background: var(--accent); color: var(--bg-primary); border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .save-btn:hover { opacity: 0.9; }
        .action-btn { width: 100%; padding: 12px 16px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; cursor: pointer; text-align: left; margin-bottom: 8px; }
        .action-btn:hover { border-color: var(--accent); }
        .episode-item { padding: 12px; background: var(--bg-tertiary); border-radius: 8px; margin-bottom: 8px; }
        .episode-id { font-weight: 600; font-size: 13px; }
        .episode-time { font-size: 12px; color: var(--text-muted); }
        .episode-badge { display: inline-block; padding: 4px 8px; background: rgba(153,135,60,0.2); border: 1px solid var(--accent); border-radius: 4px; font-size: 11px; margin-top: 8px; }
        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
        pre { background: var(--bg-tertiary); padding: 10px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
        code { background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; }
        .error-banner { background: rgba(239,68,68,0.2); border: 1px solid var(--error); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #fca5a5; }
        .success-banner { background: rgba(34,197,94,0.2); border: 1px solid var(--success); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #86efac; }
    </style>
</head>
    <body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">KF</div>
                <h1>Kungfu Agent</h1>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span id="statusText">Live Mode</span>
            </div>
        </header>
        <div id="errorBanner" class="error-banner" style="display:none;"></div>
        <div id="successBanner" class="success-banner" style="display:none;"></div>
        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">
                    <h2>Task Executor</h2>
                    <button class="action-btn" onclick="clearChat()" style="width:auto;padding:6px 12px;font-size:12px;margin:0">Clear</button>
                </div>
                <div class="chat-container">
                    <div class="messages" id="messages"><div class="empty-state"><p>Mulai dengan mengetik task di bawah ini</p></div></div>
                    <div class="input-area">
                        <textarea class="task-input" id="taskInput" placeholder="Ketik task Anda di sini..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendTask()">Send</button>
                    </div>
                </div>
            </div>
            <div class="sidebar">
                <div class="panel">
                    <div class="panel-header"><h2>API Configuration</h2></div>
                    <div class="panel-content">
                        <div class="form-group">
                            <label class="form-label">Base URL</label>
                            <input type="text" class="form-input" id="baseUrlInput" placeholder="https://api.openai.com/v1" onkeydown="if(event.key==='Enter')saveConfig()">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Model Name</label>
                            <input type="text" class="form-input" id="modelInput" placeholder="gpt-4, claude-3..." onkeydown="if(event.key==='Enter')saveConfig()">
                        </div>
                        <div class="form-group">
                            <label class="form-label">API Key</label>
                            <input type="password" class="form-input" id="apiKeyInput" placeholder="sk-..." onkeydown="if(event.key==='Enter')saveConfig()">
                        </div>
                        <button class="save-btn" onclick="saveConfig()">Save Configuration</button>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-header"><h2>Quick Actions</h2></div>
                    <div class="panel-content">
                        <button class="action-btn" onclick="quickTask('Write a Python function to calculate fibonacci')">Fibonacci Function</button>
                        <button class="action-btn" onclick="quickTask('Create a simple Flask REST API')">Flask API</button>
                        <button class="action-btn" onclick="quickTask('Explain async/await in JavaScript')">Explain Async/Await</button>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-header"><h2>Episodes</h2></div>
                    <div class="panel-content" id="episodesList"><div class="empty-state"><p>No episodes</p></div></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const STORAGE_KEY = 'kfConfig';
        let config = loadConfig();
        let history = [];
        let episodes = JSON.parse(localStorage.getItem('kfEpisodes') || '[]');
        const messagesContainer = document.getElementById('messages');
        const taskInput = document.getElementById('taskInput');
        const sendBtn = document.getElementById('sendBtn');
        const baseUrlInput = document.getElementById('baseUrlInput');
        const modelInput = document.getElementById('modelInput');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const errorBanner = document.getElementById('errorBanner');
        const successBanner = document.getElementById('successBanner');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        function loadConfig() { return localStorage.getItem(STORAGE_KEY) ? JSON.parse(localStorage.getItem(STORAGE_KEY)) : { baseUrl: '', model: '', apiKey: '' }; }
        function saveConfig() { config = { baseUrl: baseUrlInput.value.trim(), model: modelInput.value.trim(), apiKey: apiKeyInput.value.trim() }; localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); apiKeyInput.value = config.apiKey ? '••••••••' + config.apiKey.slice(-4) : ''; showSuccess('Configuration saved!'); updateStatus('Configured', true); }
        function showError(msg) { errorBanner.textContent = msg; errorBanner.style.display = 'block'; successBanner.style.display = 'none'; }
        function showSuccess(msg) { successBanner.textContent = msg; successBanner.style.display = 'block'; errorBanner.style.display = 'none'; setTimeout(() => successBanner.style.display = 'none', 3000); }
        function updateStatus(text, connected) { statusText.textContent = text; statusDot.classList.toggle('connected', connected); }
        
        document.addEventListener('DOMContentLoaded', () => {
            baseUrlInput.value = config.baseUrl;
            modelInput.value = config.model;
            if (config.apiKey) apiKeyInput.value = '••••••••' + config.apiKey.slice(-4);
            if (config.baseUrl && config.model && config.apiKey) updateStatus('Ready', true);
            taskInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTask(); } });
            loadEpisodes();
        });

        async function sendTask() {
            const task = taskInput.value.trim();
            if (!task) return;
            if (!config.baseUrl || !config.model || !config.apiKey) { showError('Please configure Base URL, Model, and API Key first'); return; }
            
            const empty = messagesContainer.querySelector('.empty-state');
            if (empty) empty.remove();
            
            addMsg('user', task);
            taskInput.value = '';
            sendBtn.disabled = true;
            errorBanner.style.display = 'none';
            updateStatus('Processing...', false);
            history.push({ role: 'user', content: task });
            
            try {
                const endpoint = config.baseUrl.endsWith('/') ? config.baseUrl + 'chat/completions' : config.baseUrl + '/chat/completions';
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + config.apiKey },
                    body: JSON.stringify({
                        model: config.model,
                        messages: [
                            { role: 'system', content: 'You are kungfu-agent, a helpful coding assistant. After each task, end your response with:\n---\n**Episode:**\n- Fact: [what you did]' },
                            ...history.slice(-10)
                        ],
                        max_tokens: 2000
                    })
                });
                
                if (!res.ok) { const err = await res.json().catch(() => ({ error: { message: 'Unknown error' } })); throw new Error(err.error?.message || 'API Error ' + res.status); }
                
                const data = await res.json();
                const response = data.choices[0].message.content;
                history.push({ role: 'assistant', content: response });
                addMsg('agent', response);
                
                const epId = 'ep-' + Date.now();
                episodes.push({ id: epId, timestamp: new Date().toISOString(), task: task.substring(0, 40) });
                localStorage.setItem('kfEpisodes', JSON.stringify(episodes));
                addMsg('system', 'Episode recorded', epId);
                loadEpisodes();
                updateStatus('Ready', true);
            } catch (e) { showError(e.message); updateStatus('Error', false); }
            sendBtn.disabled = false;
        }
        
        function addMsg(type, content, epId) { 
            const div = document.createElement('div'); 
            div.className = 'message ' + type; 
            if (type === 'system') { div.innerHTML = content + '<br><span class="episode-badge">Episode: ' + epId + '</span>'; } 
            else { div.innerHTML = content.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>').replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/---[\s\S]*?---/g, '').replace(/\n/g, '<br>'); } 
            messagesContainer.appendChild(div); 
            messagesContainer.scrollTop = messagesContainer.scrollHeight; 
        }
        
        function loadEpisodes() { const container = document.getElementById('episodesList'); if (!episodes.length) { container.innerHTML = '<div class="empty-state"><p>No episodes</p></div>'; return; } container.innerHTML = episodes.slice(-5).reverse().map(e => '<div class="episode-item"><div><span class="episode-id">' + e.id + '</span> <span class="episode-time">' + new Date(e.timestamp).toLocaleTimeString() + '</span></div><div style="font-size:11px;color:var(--text-muted);margin-top:4px;">' + (e.task || '') + '</div></div>').join(''); }
        function quickTask(t) { taskInput.value = t; sendTask(); }
        function clearChat() { history = []; messagesContainer.innerHTML = '<div class="empty-state"><p>Type a task and click Send...</p></div>'; }
    </script>
</body>
</html>
