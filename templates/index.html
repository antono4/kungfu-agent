<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kungfu Agent Interface</title>
    <meta name="description" content="Web interface untuk berinteraksi dengan kungfu-agent - AI agent dengan Kungfu-style continuity">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%2399873C'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-family='Arial' font-size='22' font-weight='700' fill='white'%3EKF%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0B0C0E;
            --bg-secondary: #14171F;
            --bg-tertiary: #1C1F26;
            --accent: #99873C;
            --accent-light: #FFE165;
            --text-primary: #FFFFFF;
            --text-secondary: #A1A1AA;
            --text-muted: #71717A;
            --border: #27272A;
            --success: #22C55E;
            --error: #EF4444;
            --warning: #F59E0B;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .logo h1 { font-size: 24px; font-weight: 600; }
        .status-badge { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg-secondary); border-radius: 20px; font-size: 14px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
        .status-dot.connected { background: var(--success); }
        .status-dot.demo { background: var(--warning); }
        .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } .sidebar { order: -1; } }
        .panel { background: var(--bg-secondary); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .panel-header h2 { font-size: 16px; font-weight: 600; }
        .panel-content { padding: 20px; }
        .chat-container { height: 500px; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .message.user { align-self: flex-end; background: var(--accent); color: var(--bg-primary); }
        .message.agent { align-self: flex-start; background: var(--bg-tertiary); }
        .message.system { align-self: center; background: transparent; color: var(--text-muted); font-size: 12px; font-style: italic; }
        .message.error { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--error); }
        .input-area { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        .task-input { flex: 1; padding: 12px 16px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; resize: none; min-height: 48px; max-height: 150px; }
        .task-input:focus { outline: none; border-color: var(--accent); }
        .task-input::placeholder { color: var(--text-muted); }
        .send-btn { padding: 12px 24px; background: var(--accent); color: var(--bg-primary); border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .send-btn:hover { opacity: 0.9; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .workspace-info { display: flex; flex-direction: column; gap: 12px; }
        .info-item { display: flex; justify-content: space-between; font-size: 14px; }
        .info-label { color: var(--text-secondary); }
        .info-value { color: var(--text-primary); font-family: monospace; word-break: break-all; }
        .quick-actions { display: flex; flex-direction: column; gap: 8px; }
        .action-btn { padding: 12px 16px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; cursor: pointer; text-align: left; transition: border-color 0.2s; }
        .action-btn:hover { border-color: var(--accent); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .episodes-list { max-height: 200px; overflow-y: auto; }
        .episode-item { padding: 12px; background: var(--bg-tertiary); border-radius: 8px; margin-bottom: 8px; }
        .episode-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .episode-id { font-weight: 600; font-size: 13px; }
        .episode-time { font-size: 12px; color: var(--text-muted); }
        .episode-facts { font-size: 12px; color: var(--text-secondary); }
        .spinner { width: 16px; height: 16px; border: 2px solid var(--bg-tertiary); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .episode-badge { display: inline-block; padding: 4px 8px; background: rgba(153, 135, 60, 0.2); border: 1px solid var(--accent); border-radius: 4px; font-size: 11px; margin-top: 8px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
        .config-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .config-modal.hidden { display: none; }
        .config-content { background: var(--bg-secondary); padding: 30px; border-radius: 12px; max-width: 500px; width: 90%; }
        .config-content h2 { margin-bottom: 20px; }
        .config-content label { display: block; margin-bottom: 8px; color: var(--text-secondary); }
        .config-content input { width: 100%; padding: 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); margin-bottom: 16px; }
        .config-content button { width: 100%; padding: 12px; background: var(--accent); color: var(--bg-primary); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .config-note { font-size: 12px; color: var(--text-muted); margin-top: 12px; text-align: center; }
        .demo-banner { background: var(--warning); color: #000; padding: 8px 16px; text-align: center; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">KF</div>
                <h1>Kungfu Agent</h1>
            </div>
            <div class="status-badge">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </header>
        
        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">
                    <h2>Task Executor</h2>
                    <button class="action-btn" onclick="clearChat()" style="padding: 6px 12px; font-size: 12px;">Clear</button>
                </div>
                <div class="chat-container">
                    <div class="messages" id="messages">
                        <div class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                            </svg>
                            <p>Mulai dengan mengetik task di bawah ini</p>
                        </div>
                    </div>
                    <div class="input-area">
                        <textarea 
                            class="task-input" 
                            id="taskInput" 
                            placeholder="Ketik task Anda di sini... (e.g., 'Add user authentication to the login endpoint')"
                            rows="1"
                        ></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendTask()">Send</button>
                    </div>
                </div>
            </div>
            
            <div class="sidebar">
                <div class="panel">
                    <div class="panel-header">
                        <h2>Workspace Info</h2>
                    </div>
                    <div class="panel-content workspace-info">
                        <div class="info-item">
                            <span class="info-label">Path</span>
                            <span class="info-value" id="workspacePath">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Agent</span>
                            <span class="info-value">kungfu-agent</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Model</span>
                            <span class="info-value" id="modelName">-</span>
                        </div>
                    </div>
                </div>
                
                <div class="panel">
                    <div class="panel-header">
                        <h2>Quick Actions</h2>
                    </div>
                    <div class="panel-content quick-actions">
                        <button class="action-btn" onclick="quickTask('Show me the project structure')">
                            📁 Show Project Structure
                        </button>
                        <button class="action-btn" onclick="quickTask('List all episodes')">
                            📋 List Episodes
                        </button>
                        <button class="action-btn" onclick="quickTask('Show current context')">
                            🔍 Show Current Context
                        </button>
                        <button class="action-btn" onclick="quickTask('Check workspace status')">
                            ✅ Check Workspace Status
                        </button>
                    </div>
                </div>
                
                <div class="panel">
                    <div class="panel-header">
                        <h2>Recent Episodes</h2>
                        <button class="action-btn" onclick="loadEpisodes()" style="padding: 4px 8px; font-size: 11px;">Refresh</button>
                    </div>
                    <div class="panel-content episodes-list" id="episodesList">
                        <div class="empty-state" style="padding: 20px;">
                            <p>No episodes yet</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Configuration
        const OPENHANDS_API_KEY = 'sk-oh-1D3r4cc3UTTMKDVkdp8dpFacX3eI7lrf';
        const API_BASE = 'https://app.all-hands.dev/api/v1';
        
        let conversationId = null;
        let isLoading = false;
        
        const messagesContainer = document.getElementById('messages');
        const taskInput = document.getElementById('taskInput');
        const sendBtn = document.getElementById('sendBtn');
        
        document.addEventListener('DOMContentLoaded', async () => {
            updateStatus('Connecting...', false);
            
            // Create or resume conversation
            try {
                const storedId = localStorage.getItem('kungfuConversationId');
                if (storedId) {
                    conversationId = storedId;
                    updateStatus('Connected', true);
                } else {
                    await createConversation();
                }
            } catch (error) {
                console.error('Init error:', error);
                updateStatus('Connection Error', false);
            }
            
            taskInput.addEventListener('input', autoResize);
            taskInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendTask();
                }
            });
        });
        
        async function createConversation() {
            const response = await fetch(API_BASE + '/conversations', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + OPENHANDS_API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    agent_name: 'kungfu-agent',
                    model: 'anthropic/claude-sonnet-4-5-20250929'
                })
            });
            
            if (!response.ok) {
                throw new Error('Failed to create conversation');
            }
            
            const data = await response.json();
            conversationId = data.conversation_id;
            localStorage.setItem('kungfuConversationId', conversationId);
            updateStatus('Connected', true);
        }
        
        function autoResize() {
            taskInput.style.height = 'auto';
            taskInput.style.height = Math.min(taskInput.scrollHeight, 150) + 'px';
        }
        
        function updateStatus(text, connected) {
            document.getElementById('statusText').textContent = text;
            const dot = document.getElementById('statusDot');
            dot.classList.remove('connected', 'demo');
            if (connected) {
                dot.classList.add('connected');
            }
        }
        
        async function sendTask() {
            const task = taskInput.value.trim();
            if (!task || isLoading) return;
            
            const emptyState = messagesContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();
            
            // Add user message
            addMessage('user', task);
            taskInput.value = '';
            autoResize();
            sendBtn.disabled = true;
            isLoading = true;
            
            try {
                // Send message
                const response = await fetch(API_BASE + '/conversations/' + conversationId + '/messages', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + OPENHANDS_API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: task
                    })
                });
                
                if (!response.ok) {
                    const error = await response.text();
                    throw new Error('API Error: ' + response.status);
                }
                
                const data = await response.json();
                
                // Add agent response
                if (data.message) {
                    addMessage('agent', data.message);
                } else if (data.response) {
                    addMessage('agent', data.response);
                } else {
                    addMessage('agent', JSON.stringify(data));
                }
                
                // Show episode info
                if (data.episode_id) {
                    addMessage('system', 'Episode recorded', { episode_id: data.episode_id });
                }
                
            } catch (error) {
                console.error('Error:', error);
                addMessage('error', error.message);
            }
            
            sendBtn.disabled = false;
            isLoading = false;
        }
        
        function addMessage(type, content) {
            const msg = document.createElement('div');
            msg.className = 'message ' + type;
            
            if (type === 'system' && arguments[1]) {
                msg.innerHTML = '<div>' + content + '</div><div class="episode-badge">Episode: ' + arguments[1].episode_id + '</div>';
            } else {
                // Render markdown-like content
                msg.innerHTML = content
                    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="$1">$2</code></pre>')
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                    .replace(/\n/g, '<br>');
            }
            
            messagesContainer.appendChild(msg);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function quickTask(task) {
            taskInput.value = task;
            sendTask();
        }
        
        function clearChat() {
            messagesContainer.innerHTML = '<div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg><p>Mulai dengan mengetik task di bawah ini</p></div>';
        }
    </script>
</body>
</html>
